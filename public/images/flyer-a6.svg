<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 297.64 419.53" width="297.64" height="419.53" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <!-- A6 = 105mm x 148mm = 297.64pt x 419.53pt -->

  <!-- ==================== VORDERSEITE ==================== -->
  <!-- Background -->
  <rect width="297.64" height="419.53" fill="#0f1729"/>

  <!-- Subtle gradient overlay -->
  <defs>
    <linearGradient id="heroGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0f1729" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect width="297.64" height="419.53" fill="url(#heroGrad)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="297.64" height="4" fill="#d4a74a"/>

  <!-- Logo Shield -->
  <g transform="translate(118, 40) scale(2)">
    <path d="M16 2L4 7v9c0 7.18 5.12 13.88 12 15.5C22.88 29.88 28 23.18 28 16V7L16 2z" fill="#d4a74a" opacity="0.15" stroke="#d4a74a" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M9 19h14M10.5 17l1.5-3h8l1.5 3M10 19a1 1 0 1 0 2 0 1 1 0 0 0-2 0zM20 19a1 1 0 1 0 2 0 1 1 0 0 0-2 0z" stroke="#d4a74a" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <line x1="12" y1="12" x2="20" y2="12" stroke="#d4a74a" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Brand name -->
  <text x="148.82" y="120" text-anchor="middle" font-size="22" font-weight="700" fill="#f0e6d3" letter-spacing="1">Oldtimer Docs</text>
  <text x="148.82" y="138" text-anchor="middle" font-size="8" font-weight="500" fill="#d4a74a" letter-spacing="3" text-transform="uppercase">DIE DIGITALE FAHRZEUGAKTE FÜR OLDTIMER</text>

  <!-- Divider -->
  <line x1="100" y1="155" x2="198" y2="155" stroke="#d4a74a" stroke-width="0.5" opacity="0.4"/>

  <!-- Headline -->
  <text x="148.82" y="185" text-anchor="middle" font-size="16" font-weight="700" fill="#f0e6d3">Jede Wartung.</text>
  <text x="148.82" y="206" text-anchor="middle" font-size="16" font-weight="700" fill="#f0e6d3">Jedes Dokument.</text>
  <text x="148.82" y="227" text-anchor="middle" font-size="16" font-weight="700" fill="#d4a74a">Jedes Detail.</text>

  <!-- Subheadline -->
  <text x="148.82" y="256" text-anchor="middle" font-size="8.5" fill="#a0aec0" font-weight="400">Die komplette Historie Ihres Oldtimers</text>
  <text x="148.82" y="268" text-anchor="middle" font-size="8.5" fill="#a0aec0" font-weight="400">digital dokumentiert — sicher und jederzeit abrufbar.</text>

  <!-- Feature list -->
  <g transform="translate(55, 290)" font-size="8.5" fill="#f0e6d3">
    <!-- Feature 1 -->
    <circle cx="6" cy="-3" r="2.5" fill="#d4a74a" opacity="0.8"/>
    <text x="6" y="-0.5" text-anchor="middle" font-size="5" fill="#0f1729" font-weight="700">&#x2713;</text>
    <text x="16" y="0" font-weight="400">Digitales Scheckheft</text>

    <!-- Feature 2 -->
    <circle cx="6" cy="16" r="2.5" fill="#d4a74a" opacity="0.8"/>
    <text x="6" y="18.5" text-anchor="middle" font-size="5" fill="#0f1729" font-weight="700">&#x2713;</text>
    <text x="16" y="19" font-weight="400">Dokumenten-Archiv</text>

    <!-- Feature 3 -->
    <circle cx="6" cy="35" r="2.5" fill="#d4a74a" opacity="0.8"/>
    <text x="6" y="37.5" text-anchor="middle" font-size="5" fill="#0f1729" font-weight="700">&#x2713;</text>
    <text x="16" y="38" font-weight="400">Fahrzeug-Timeline</text>

    <!-- Feature 4 -->
    <circle cx="6" cy="54" r="2.5" fill="#d4a74a" opacity="0.8"/>
    <text x="6" y="56.5" text-anchor="middle" font-size="5" fill="#0f1729" font-weight="700">&#x2713;</text>
    <text x="16" y="57" font-weight="400">Erinnerungen an HU &amp; Service</text>

    <!-- Feature 5 -->
    <circle cx="6" cy="73" r="2.5" fill="#d4a74a" opacity="0.8"/>
    <text x="6" y="75.5" text-anchor="middle" font-size="5" fill="#0f1729" font-weight="700">&#x2713;</text>
    <text x="16" y="76" font-weight="400">Fahrzeug teilen &amp; transferieren</text>
  </g>

  <!-- URL -->
  <text x="148.82" y="400" text-anchor="middle" font-size="8" fill="#a0aec0" font-weight="400">oldtimer-docs.com</text>

  <!-- Bottom accent line -->
  <rect x="0" y="415.53" width="297.64" height="4" fill="#d4a74a"/>

</svg>
